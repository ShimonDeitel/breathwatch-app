name: Breathwatch
options:
  bundleIdPrefix: com.shimondeitel.respsymptom
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Breathwatch:
    type: application
    platform: iOS
    sources:
      - path: Breathwatch
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.respsymptom
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Breathwatch/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  BreathwatchTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: BreathwatchTests
      - path: Breathwatch.storekit
    dependencies:
      - target: Breathwatch
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.respsymptom.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  BreathwatchUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: BreathwatchUITests
    dependencies:
      - target: Breathwatch
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.respsymptom.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Breathwatch:
    build:
      targets:
        Breathwatch: all
        BreathwatchTests: [test]
        BreathwatchUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Breathwatch.storekit
    test:
      config: Debug
      storeKitConfiguration: Breathwatch.storekit
      targets:
        - BreathwatchTests
        - BreathwatchUITests
    archive:
      config: Release
